# Default configuration for AE-NodeFormer + SAC framework
# Matches hyperparameters reported in Table 1 of the manuscript

seed: 42
device: cuda
output_dir: runs/default

data:
  ohlcv_dir: data/raw/ohlcv
  sentiment_path: data/raw/sentiment/css_daily_scores.parquet
  stocks:
    - AAPL
    - MSFT
    - CRM
    - JPM
    - V
    - JNJ
    - UNH
    - PFE
    - WMT
    - HD
    - XOM
    - CVX
    - PG
    - KO
    - NKE
    - MCD
    - NFLX
    - VZ
    - BA
    - CAT
  train_period: [1982-01-01, 2010-12-31]
  val_period: [2011-01-01, 2016-12-31]
  test_period: [2017-01-01, 2025-03-31]
  sequence_length: 252
  prediction_horizons: [1, 5, 20]
  vix_stable_percentile: 75
  prediction_feature_dim: 17
  router_feature_dim: 6

autoencoder:
  hidden_layers: [64, 32]
  latent_dim: 32
  activation: relu
  learning_rate: 1.0e-3
  batch_size: 64
  epochs: 20
  early_stopping_patience: 5

node_transformer:
  num_layers: 6
  num_heads: 8
  model_dim: 512
  ffn_dim: 2048
  dropout: 0.1
  learning_rate: 1.0e-4
  batch_size: 32
  epochs: 60
  context_dim: 12
  regime_embedding_dim: 4
  sentiment_spike_dim: 2
  event_characterization_dim: 4
  cross_asset_stress_dim: 2
  edge_sector_weight: 0.5
  edge_correlation_weight: 0.5

sac:
  hidden_layers: [256, 256]
  learning_rate: 3.0e-4
  soft_update_tau: 0.005
  replay_buffer_size: 100000
  batch_size: 256
  epochs: 50
  steps_per_epoch: 1000
  initial_threshold_percentile: 95
  initial_alpha: 0.5
  action_bounds: [-0.1, 0.1]
  reward:
    lambda_dir: 0.5
    lambda_stable: 0.1
  state_history_window: 5

finetune:
  epochs: 20
  learning_rates:
    autoencoder: 1.0e-4
    node_transformer: 1.0e-5
    sac: 3.0e-5

loss:
  lambda_mse: 1.0
  lambda_dir: 0.5
  lambda_reg: 1.0e-4

evaluation:
  metrics: [mape, rmse, da, theils_u, ctr]
  risk_free_rate: 0.02

backtest:
  top_k: 5
  transaction_cost_bps: 10
  rebalance_frequency: daily
  benchmark: equal_weighted
